name: CI

on:
  push:
    branches: [main, develop, release-please--*]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read
  security-events: write

jobs:
  ci:
    uses: pipe-works/.github/.github/workflows/reusable-python-ci.yml@main
    with:
      python-version: '3.12'
      python-versions: '["3.12", "3.13"]'
      coverage-threshold: 85
      run-security: true
      run-docs: true
      docs-warning-threshold: 80
      test-os: '["ubuntu-latest", "macos-latest", "windows-latest"]'
      requires-models: false
    secrets: inherit

  api-contract-tests:
    name: API Contract Tests
    if: ${{ hashFiles('tests/test_pipeworks_webapp_api_contracts.py') != '' }}
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f pyproject.toml ]; then
          pip install -e ".[dev]"
        elif [ -f requirements-dev.txt ]; then
          pip install -r requirements-dev.txt
        elif [ -f requirements.txt ]; then
          pip install -r requirements.txt
        fi
    - name: Run API contract tests
      run: pytest -q tests/test_pipeworks_webapp_api_contracts.py
